apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: lunch-api
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      # Discovers pods across ALL namespaces that have annotation prometheus.io/scrape=true.
      # lunch-api pods have this annotation in k8s/base/deployment.yaml.
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          # Only scrape pods that opted in
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          # Build __address__ as <pod-ip>:<annotation-port>
          # __meta_kubernetes_pod_ip gives the actual pod IP; we append the port from the annotation.
          - source_labels: [__meta_kubernetes_pod_ip, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: (.+);(.+)
            replacement: $1:$2
            target_label: __address__
          # Override scrape path from annotation if set
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          # Carry useful labels into every metric
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app