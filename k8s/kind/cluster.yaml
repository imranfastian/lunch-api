# yaml-language-server: $schema=https://json.schemastore.org/kind.json
# kind cluster configuration for local development and CI testing.
#
# Cluster name : lunch          (passed via --name, cannot be set in this file)
# Namespace    : lunch-api      (created by Helm --create-namespace or kubectl apply -k)
#
# Creates 1 control-plane + 2 workers (required by TopologySpreadConstraints).
# Node image pinned to v1.30.0: newer images (v1.31+) require cgroup v2 which
# Docker Desktop on Windows uses cgroup v1 — v1.30.0 works with both.
#
# Usage (Windows PowerShell):
#   kind create cluster --name lunch --config k8s\kind\cluster.yaml --wait 90s
# Delete:
#   kind delete cluster --name lunch

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    image: kindest/node:v1.30.0

  - role: worker
    image: kindest/node:v1.30.0

  - role: worker
    image: kindest/node:v1.30.0
