apiVersion: v1
kind: ConfigMap
metadata:
  name: lunch-api-config
  namespace: lunch-api
  labels:
    app.kubernetes.io/name: lunch-api
    app.kubernetes.io/part-of: lunch-api
data:
  # Server port — must match containerPort in deployment.yaml
  PORT: "8000"
  # Gin runs in release mode in production (disables debug logging)
  GIN_MODE: "release"
