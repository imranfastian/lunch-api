apiVersion: v1
kind: Service
metadata:
  name: lunch-api
  namespace: lunch-api
  labels:
    app.kubernetes.io/name: lunch-api
    app.kubernetes.io/part-of: lunch-api
spec:
  # ClusterIP makes the service reachable only within the cluster.
  # External access is handled by the Ingress resource.
  type: ClusterIP
  selector:
    app: lunch-api
  ports:
    - name: http
      port: 80           # Port exposed inside the cluster
      targetPort: http   # Maps to containerPort named "http" (8000)
      protocol: TCP

      # always follows wherever the "http" port moves ,change containerPort to 9000 and the service
      # automatically routes to 9000 — one edit, consistent everywhere
