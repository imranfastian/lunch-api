apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: lunch-api
data:
  # Datasource: points to the prometheus Service on port 9090
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://prometheus:9090
        access: proxy
        isDefault: true
        editable: false

  # Dashboard provider: tells Grafana to load dashboards from /var/lib/grafana/dashboards
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: default
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        options:
          path: /var/lib/grafana/dashboards

  # The Lunch API dashboard JSON
  lunch-api.json: |
    {
      "annotations": { "list": [] },
      "description": "Lunch API — request rate, latency percentiles, error rate",
      "editable": true,
      "graphTooltip": 1,
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 1, "showPoints": "never", "spanNulls": false }, "unit": "reqps" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "id": 1,
          "options": { "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "multi" } },
          "targets": [{ "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "sum by (path) (rate(lunch_api_http_requests_total[5m]))", "legendFormat": "{{path}}", "refId": "A" }],
          "title": "Request Rate by Path",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 1, "showPoints": "never", "spanNulls": false }, "unit": "reqps" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "id": 2,
          "options": { "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "multi" } },
          "targets": [{ "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "sum by (status) (rate(lunch_api_http_requests_total[5m]))", "legendFormat": "HTTP {{status}}", "refId": "A" }],
          "title": "Request Rate by Status Code",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 1, "showPoints": "never", "spanNulls": false }, "unit": "s" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 8 },
          "id": 3,
          "options": { "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "multi" } },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "histogram_quantile(0.99, sum by (path, le) (rate(lunch_api_http_duration_seconds_bucket[5m])))", "legendFormat": "p99 - {{path}}", "refId": "A" },
            { "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "histogram_quantile(0.95, sum by (path, le) (rate(lunch_api_http_duration_seconds_bucket[5m])))", "legendFormat": "p95 - {{path}}", "refId": "B" },
            { "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "histogram_quantile(0.50, sum by (path, le) (rate(lunch_api_http_duration_seconds_bucket[5m])))", "legendFormat": "p50 - {{path}}", "refId": "C" }
          ],
          "title": "Request Latency Percentiles (p50 / p95 / p99)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "color": { "fixedColor": "green", "mode": "fixed" }, "unit": "short" }, "overrides": [] },
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 16 },
          "id": 4,
          "options": { "colorMode": "background", "graphMode": "area", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "targets": [{ "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "sum(lunch_api_http_requests_total)", "legendFormat": "Total", "refId": "A" }],
          "title": "Total Requests",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 0.1 }, { "color": "red", "value": 0.5 }] }, "unit": "s" }, "overrides": [] },
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 16 },
          "id": 5,
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "targets": [{ "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "histogram_quantile(0.99, sum by (le) (rate(lunch_api_http_duration_seconds_bucket[5m])))", "legendFormat": "p99", "refId": "A" }],
          "title": "P99 Latency",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 0.01 }, { "color": "red", "value": 0.05 }] }, "unit": "percentunit" }, "overrides": [] },
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 16 },
          "id": 6,
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "targets": [{ "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "sum(rate(lunch_api_http_requests_total{status=~\"5..\"}[5m])) / sum(rate(lunch_api_http_requests_total[5m]))", "legendFormat": "5xx %", "refId": "A" }],
          "title": "5xx Error Rate",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "green", "value": 1 }] }, "unit": "short" }, "overrides": [] },
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 16 },
          "id": 7,
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "targets": [{ "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "sum(up{job=\"kubernetes-pods\"})", "legendFormat": "Pods up", "refId": "A" }],
          "title": "Pods Scraping",
          "type": "stat"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": ["lunch-api", "go", "prometheus"],
      "templating": { "list": [{ "hide": 0, "includeAll": false, "multi": false, "name": "datasource", "query": "prometheus", "refresh": 1, "type": "datasource" }] },
      "time": { "from": "now-1h", "to": "now" },
      "timezone": "browser",
      "title": "Lunch API",
      "uid": "lunch-api-v1",
      "version": 1
    }