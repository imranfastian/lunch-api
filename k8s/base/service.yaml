apiVersion: v1
kind: Service
metadata:
  name: lunch-api
  namespace: lunch-api
  labels:
    app.kubernetes.io/name: lunch-api
    app.kubernetes.io/part-of: lunch-api
spec:
  # ClusterIP makes the service reachable only within the cluster.
  # External access is handled by the Ingress resource.
  type: ClusterIP
  selector:
    app: lunch-api
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9091
      targetPort: metrics
      protocol: TCP
