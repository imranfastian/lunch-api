apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: lunch-api
  namespace: lunch-api
  labels:
    app.kubernetes.io/name: lunch-api
    app.kubernetes.io/part-of: lunch-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: lunch-api
  # Keep between 2 and 5 replicas
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          # Scale out when average CPU across all pods exceeds 70%
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          # Scale out when average memory exceeds 80%
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30    # React quickly to traffic spikes
      policies:
        - type: Pods
          value: 1
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 120   # Wait 2 min before scaling down (avoid flapping)
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
